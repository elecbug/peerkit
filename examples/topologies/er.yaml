version: 1
protocol: base_flooding
experiment:
  name: topology-er
  seed: 42
  duration_ms: 3000
  warmup_ms: 100
deployment:
  mode: compose
domain:
  n: 20
  id_prefix: n
  zero_padding: 2
  topology:
    model: er
    average_degree: 8
    ensure_connected: true
  node:
    processing_delay: "constant(10ms)"
    workers: 1
    queue_capacity: 64
    overflow_policy: drop_new
  edge:
    delay: "constant(10ms)"
    loss_rate: 0.0
    bandwidth_mbps: 100
    queue_capacity: 32
traffic:
  - source: random
    start_at_ms: 0
    count: 1
    interval_ms: 0
    payload_size_bytes: 256
