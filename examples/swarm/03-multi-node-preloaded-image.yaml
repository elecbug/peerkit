version: 1
protocol: duplicate_aware_flooding

experiment:
  name: swarm-multi-node-preloaded
  seed: 77
  duration_ms: 15000
  warmup_ms: 2000
  control_base_port: 18080

deployment:
  mode: swarm
  swarm:
    # The exact image tag must already exist on every eligible Swarm node.
    push_image: false
    with_registry_auth: false
    startup_timeout_seconds: 900
    startup_batch_size: 25
    startup_batch_interval_ms: 1000
    controller_constraints:
      - node.role == manager
    peer_constraints:
      - node.labels.peerkit == true
    max_replicas_per_node: 200
    network:
      subnet: 10.201.0.0/16
      attachable: true

controller:
  parallelism: 32
  operation_timeout_seconds: 300

metrics:
  buffer_bytes: 131072
  queue_capacity: 256
  flush_interval_ms: 250

domain:
  n: 400
  id_prefix: n
  zero_padding: 3
  topology:
    model: ba
    m: 6
  node:
    processing_delay: "normal(mean=100ms, stddev=25ms)"
    workers: 2
    queue_capacity: 512
    overflow_policy: drop_new
  edge:
    delay: "exponential(mean=30ms)"
    loss_rate: 0.002
    bandwidth_mbps: 100
    queue_capacity: 64
  resources:
    cpu_limit: 0.20
    memory_limit_mb: 128

traffic:
  - source: random
    start_at_ms: 0
    count: 100
    interval_ms: 75
    payload_size_bytes: 1024
