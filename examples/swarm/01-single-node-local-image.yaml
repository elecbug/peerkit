version: 1
protocol: base_flooding

experiment:
  name: swarm-single-node-local-image
  seed: 42
  duration_ms: 10000
  warmup_ms: 1000
  control_base_port: 18080

deployment:
  mode: swarm
  swarm:
    # Build/load the same image on the single Swarm manager before running.
    push_image: false
    with_registry_auth: false
    startup_timeout_seconds: 600
    startup_batch_size: 10
    startup_batch_interval_ms: 1000
    max_replicas_per_node: 100
    # No placement constraints: the only active node is eligible.
    network:
      subnet: 10.200.0.0/16
      attachable: true

controller:
  parallelism: 32
  operation_timeout_seconds: 300

metrics:
  buffer_bytes: 131072
  queue_capacity: 256
  flush_interval_ms: 250

domain:
  n: 100
  id_prefix: n
  zero_padding: 3
  topology:
    model: er
    average_degree: 12
    ensure_connected: true
  node:
    processing_delay: "normal(mean=100ms, stddev=25ms)"
    workers: 2
    queue_capacity: 512
    overflow_policy: drop_new
  edge:
    delay: "exponential(mean=30ms)"
    loss_rate: 0.005
    bandwidth_mbps: 100
    queue_capacity: 64
  resources:
    cpu_limit: 0.20
    memory_limit_mb: 128

traffic:
  - source: random
    start_at_ms: 0
    count: 100
    interval_ms: 75
    payload_size_bytes: 1024
