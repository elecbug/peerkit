version: 1

experiment:
  name: ring-demo
  seed: 42
  duration_ms: 8000
  warmup_ms: 500
  control_base_port: 18080

defaults:
  node:
    processing_delay:
      distribution: normal
      mean_ms: 50
      stddev_ms: 10
    workers: 1
    queue_capacity: 1024
    overflow_policy: drop_new

  edge:
    delay:
      distribution: exponential
      mean_ms: 25
    loss_rate: 0.0
    bandwidth_mbps: 10
    queue_capacity: 1024

topology:
  directed: false
  nodes:
    - id: n0
    - id: n1
      performance:
        processing_delay:
          distribution: constant
          value_ms: 150
        workers: 1
        queue_capacity: 1024
        overflow_policy: drop_new
    - id: n2
    - id: n3

  edges:
    - source: n0
      target: n1
    - source: n1
      target: n2
      network:
        delay:
          distribution: constant
          value_ms: 200
        loss_rate: 0.0
        bandwidth_mbps: 5
        queue_capacity: 512
    - source: n2
      target: n3
    - source: n3
      target: n0

traffic:
  - source: n0
    start_at_ms: 0
    count: 20
    interval_ms: 200
    payload_size_bytes: 1024
