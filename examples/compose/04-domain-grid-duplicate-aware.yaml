version: 1
protocol: duplicate_aware_flooding

experiment:
  name: compose-grid-duplicate-aware
  seed: 42
  duration_ms: 12000
  warmup_ms: 1000
  control_base_port: 18080

deployment:
  mode: compose
  compose_parallelism: 4

domain:
  n: 169
  id_prefix: n
  zero_padding: 3
  topology:
    model: grid
    rows: 13
    columns: 13
  node:
    processing_delay: "normal(mean=100ms, stddev=25ms)"
    workers: 2
    queue_capacity: 512
    overflow_policy: drop_new
  edge:
    delay: "exponential(mean=30ms)"
    loss_rate: 0.0
    bandwidth_mbps: 100
    queue_capacity: 64

traffic:
  - source: random
    start_at_ms: 0
    count: 100
    interval_ms: 50
    payload_size_bytes: 1024
