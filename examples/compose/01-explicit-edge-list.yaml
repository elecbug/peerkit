version: 1
protocol: base_flooding

experiment:
  name: compose-explicit-edge-list
  seed: 42
  duration_ms: 8000
  warmup_ms: 500
  control_base_port: 18080

deployment:
  mode: compose
  compose_parallelism: 4

defaults:
  node:
    processing_delay: "normal(mean=50ms, stddev=10ms)"
    workers: 1
    queue_capacity: 256
    overflow_policy: drop_new
  edge:
    delay: "exponential(mean=25ms)"
    loss_rate: 0.0
    bandwidth_mbps: 10
    queue_capacity: 64

topology:
  directed: false
  nodes:
    - id: n0
    - id: n1
      performance:
        processing_delay: "constant(150ms)"
        workers: 1
        queue_capacity: 256
        overflow_policy: drop_new
    - id: n2
    - id: n3
  edges:
    - source: n0
      target: n1
    - source: n1
      target: n2
      network:
        delay: "constant(200ms)"
        loss_rate: 0.0
        bandwidth_mbps: 5
        queue_capacity: 32
    - source: n2
      target: n3
    - source: n3
      target: n0

traffic:
  - source: n0
    start_at_ms: 0
    count: 20
    interval_ms: 200
    payload_size_bytes: 1024
