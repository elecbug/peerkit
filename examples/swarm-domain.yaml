version: 1
protocol: idontwant_flooding

experiment:
  name: swarm-er-500
  seed: 42
  duration_ms: 15000
  warmup_ms: 2000
  # In Swarm mode this is the single published Controller API port.
  control_base_port: 18080

deployment:
  mode: swarm
  swarm:
    # Build locally and push before docker stack deploy.
    # Run with --image registry.example.com/peerkit/peerkit:0.6.0.
    push_image: true
    with_registry_auth: true
    startup_timeout_seconds: 600
    startup_batch_size: 25
    startup_batch_interval_ms: 1000
    placement_constraints:
      - node.labels.peerkit == true
    max_replicas_per_node: 200

controller:
  parallelism: 32
  operation_timeout_seconds: 300

metrics:
  buffer_bytes: 262144
  queue_capacity: 512
  flush_interval_ms: 200

domain:
  n: 500
  id_prefix: n
  zero_padding: 3

  topology:
    model: er
    average_degree: 12
    ensure_connected: true

  node:
    processing_delay: "normal(mean=100ms, stddev=25ms)"
    workers: 2
    queue_capacity: 512
    overflow_policy: drop_new

  edge:
    delay: "exponential(mean=30ms)"
    loss_rate: 0.005
    bandwidth_mbps: 100
    queue_capacity: 64

  resources:
    cpu_limit: 0.20
    memory_limit_mb: 128

traffic:
  - source: random
    start_at_ms: 0
    count: 100
    interval_ms: 75
    payload_size_bytes: 1024
